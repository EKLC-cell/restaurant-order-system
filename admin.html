<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display | Cafe 81</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <div id="login-box" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-slate-900 p-10 rounded-[3rem] shadow-2xl w-full max-w-sm border border-slate-800 text-center">
            <div class="w-16 h-16 bg-green-500 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-green-900/20">
                <span class="text-3xl">👨‍🍳</span>
            </div>
            <h2 class="text-2xl font-black mb-2 tracking-tighter">Kitchen Access</h2>
            <p class="text-slate-500 text-sm mb-8">Enter your secure terminal pin</p>
            
            <input id="pin" type="password" placeholder="••••" class="w-full bg-slate-800 border-none rounded-2xl p-5 text-center text-3xl tracking-[1em] mb-6 focus:ring-2 focus:ring-green-500 outline-none">
            <button onclick="login()" class="w-full bg-green-600 p-5 rounded-2xl font-black text-lg hover:bg-green-700 transition-all shadow-xl shadow-green-900/20 active:scale-95">OPEN TERMINAL</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-6 lg:p-12">
        <div class="flex justify-between items-end mb-12 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-black text-green-500 tracking-tighter uppercase italic">Live Kitchen Feed ⚡</h1>
                <p class="text-slate-500 font-bold mt-2 text-sm flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    SYSTEM ONLINE - WAITING FOR PAID ORDERS
                </p>
            </div>
            <button onclick="location.reload()" class="bg-slate-900 text-slate-400 px-6 py-3 rounded-2xl font-bold text-xs border border-slate-800 hover:text-white transition-all">REFRESH</button>
        </div>

        <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let lastId = null;
        
        // --- BURASI SENİN GİZLİ ŞİFREN ---
        const ADMIN_PASSWORD = "8181"; 

        function login() {
            const enteredPin = document.getElementById('pin').value;
            if(enteredPin === ADMIN_PASSWORD) {
                document.getElementById('login-box').remove();
                document.getElementById('dashboard').classList.remove('hidden');
                init(); // Giriş başarılıysa sistemi başlat
            } else { 
                alert("Incorrect Pin! Access Denied."); 
                document.getElementById('pin').value = ''; // Yanlışsa kutuyu temizle
            }
        }

        async function getOrders() {
            try {
                // Stripe'tan başarılı ödemeleri çeken arka plan dosyana bağlanıyoruz
                const res = await fetch('/api/orders');
                if(!res.ok) throw new Error("API Error");
                
                const data = await res.json();
                render(data);
                
                // Yeni sipariş geldiğinde zil çalması için kontrol
                if(data.length > 0 && data[0].id !== lastId) {
                    if(lastId !== null) document.getElementById('bell').play();
                    lastId = data[0].id;
                }
            } catch(e) { 
                console.error("Siparişler çekilemedi:", e); 
            }
        }

        function render(orders) {
            const container = document.getElementById('orders-container');
            if(orders.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-700 font-black text-2xl uppercase italic">No paid orders yet...</div>`;
                return;
            }

            container.innerHTML = orders.map(o => `
                <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-2 h-full bg-green-500"></div>
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-slate-500 font-mono text-xs">${o.time}</span>
                        <span class="bg-green-500/20 text-green-400 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">PAID</span>
                    </div>
                    <h3 class="text-2xl font-black mb-4 leading-tight text-slate-100">${o.items}</h3>
                    <div class="bg-slate-800/50 p-4 rounded-2xl mb-6 border border-slate-700/50">
                        <p class="text-amber-400 text-sm font-bold italic">📝 Note: "${o.note}"</p>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400 font-bold tracking-widest text-lg">£${parseFloat(o.amount).toFixed(2)}</span>
                        <button onclick="window.print()" class="bg-white text-black px-6 py-3 rounded-2xl font-black text-xs hover:bg-green-400 transition-all shadow-lg active:scale-95">PRINT RECEIPT</button>
                    </div>
                </div>
            `).join('');
        }

        // Sistemi 15 saniyede bir otomatik güncelle
        function init() { 
            getOrders(); 
            setInterval(getOrders, 15000); 
        }
    </script>
</body>
</html>
