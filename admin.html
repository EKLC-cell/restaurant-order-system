<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MUTFAK PANELİ | Sahin Kebab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5 font-sans">

    <div id="login-screen" class="flex flex-col items-center justify-center h-screen">
        <h2 class="text-2xl mb-4 text-green-400 font-bold tracking-widest">YÖNETİCİ GİRİŞİ</h2>
        <input id="pass" type="password" placeholder="Şifre Giriniz" class="p-4 rounded bg-slate-800 border border-slate-700 text-center text-2xl outline-none focus:border-green-500">
        <button onclick="checkPass()" class="mt-4 bg-green-600 px-10 py-3 rounded-full font-bold">GİRİŞ YAP</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-black text-green-500 underline decoration-double">CANLI SİPARİŞLER</h1>
            <div id="status" class="text-sm bg-slate-800 px-4 py-2 rounded-full text-slate-400 italic">Bağlantı Aktif...</div>
        </div>

        <div id="orders-list" class="grid gap-4">
            </div>
    </div>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let lastOrderId = null;

        function checkPass() {
            if(document.getElementById('pass').value === 'sahin123') { // Burası senin şifren!
                document.getElementById('login-screen').remove();
                document.getElementById('admin-panel').classList.remove('hidden');
                startStalking();
            } else { alert('Hatalı Şifre!'); }
        }

        async function fetchOrders() {
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                renderOrders(orders);
                
                // Yeni sipariş geldi mi kontrol et
                if(orders.length > 0 && orders[0].id !== lastOrderId) {
                    if(lastOrderId !== null) document.getElementById('alert-sound').play();
                    lastOrderId = orders[0].id;
                }
            } catch (e) { console.error("Siparişler çekilemedi"); }
        }

        function renderOrders(orders) {
            const list = document.getElementById('orders-list');
            list.innerHTML = orders.map(o => `
                <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-green-500 shadow-2xl flex justify-between items-center animate-pulse-once">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-slate-400 text-sm font-mono">${o.time}</span>
                            <span class="bg-green-900 text-green-300 px-3 py-1 rounded text-xs font-bold uppercase tracking-tighter">${o.id.slice(-5)}</span>
                        </div>
                        <h3 class="text-xl font-bold mb-1">${o.items}</h3>
                        <p class="text-slate-400 text-sm italic mb-2">${o.note}</p>
                        <div class="text-green-400 font-bold">Toplam: £${o.amount.toFixed(2)}</div>
                    </div>
                    <button onclick="window.print()" class="bg-white text-black px-6 py-3 rounded-xl font-black hover:bg-green-400 transition-all">YAZDIR</button>
                </div>
            `).join('');
        }

        function startStalking() {
            fetchOrders();
            setInterval(fetchOrders, 20000); // 20 saniyede bir kontrol et
        }
    </script>
</body>
</html>
