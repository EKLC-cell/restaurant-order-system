<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Sipariş - Sahin Kebab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 p-5 max-w-md mx-auto min-h-screen">

    <h1 class="text-2xl font-bold mb-6 text-center text-green-700">Sahin Kebab Menu</h1>
    
    <div id="menu" class="space-y-4">
        <p class="text-center text-gray-500">Menü yükleniyor...</p>
    </div>

    <div id="cart" class="mt-10 p-5 bg-white rounded-2xl shadow-xl hidden">
        <h2 class="font-bold border-b pb-3 text-lg">Sepetiniz</h2>
        <div id="cart-items" class="py-3 text-sm space-y-2"></div>
        
        <div class="border-t pt-4 space-y-3">
            <textarea id="address" placeholder="Teslimat Adresi (Örn: 15 Hertford St, CV1)" class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-green-500 outline-none"></textarea>
            <input id="note" type="text" placeholder="Sipariş Notu (Örn: Acılı olsun)" class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-green-500 outline-none">
        </div>

        <div class="text-2xl font-extrabold mt-4 flex justify-between items-center">
            <span>Toplam:</span>
            <span id="total" class="text-green-700">£0.00</span>
        </div>

        <button id="pay-btn" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl mt-6 font-bold text-lg transition-transform active:scale-95">
            ÖDEMEYE GEÇ
        </button>
    </div>

    <script>
        // KENDİ LİNKİNİ BURAYA YAPIŞTIRMAYI UNUTMA!
        const CSV_URL = 'BURAYA_KENDI_LINKINI_YAPISTIR'; 
        
        let cart = [];

        // Menüyü Getir
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (results) => {
                const menu = document.getElementById('menu');
                menu.innerHTML = '';
                
                results.data.forEach((item, index) => {
                    const cleanItem = {};
                    Object.keys(item).forEach(key => {
                        cleanItem[key.trim().toLowerCase()] = item[key];
                    });

                    const name = cleanItem.name;
                    const price = parseFloat(cleanItem.price);
                    const optionsStr = cleanItem.options; // Opsiyonları çektik

                    if (name && !isNaN(price)) {
                        // Opsiyon Menüsü Oluşturma
                        let optionsHTML = '';
                        if (optionsStr && optionsStr.trim() !== '') {
                            const opts = optionsStr.split(',');
                            optionsHTML = `<select id="opt-${index}" class="mt-3 w-full border rounded p-2 text-sm text-gray-700 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-green-500">
                                <option value="0|Standart">Standart (+£0.00)</option>`;
                            
                            opts.forEach(opt => {
                                const parts = opt.split(':');
                                if (parts.length === 2) {
                                    const oName = parts[0].trim();
                                    const oPrice = parseFloat(parts[1]);
                                    if (!isNaN(oPrice)) {
                                        optionsHTML += `<option value="${oPrice}|${oName}">${oName} (+£${oPrice.toFixed(2)})</option>`;
                                    }
                                }
                            });
                            optionsHTML += `</select>`;
                        }

                        menu.innerHTML += `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                <div class="flex justify-between items-center">
                                    <div>
                                        <h3 class="font-bold text-gray-800">${name}</h3>
                                        <p class="text-green-600 font-semibold text-sm">£${price.toFixed(2)}</p>
                                    </div>
                                    <button onclick="addToCart('${name.replace(/'/g, "\\'")}', ${price}, ${index})" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-green-700 transition-colors">
                                        + Ekle
                                    </button>
                                </div>
                                ${optionsHTML}
                            </div>
                        `;
                    }
                });
            }
        });

        // Sepete Ekleme (Opsiyon Hesaplamalı)
        function addToCart(baseName, basePrice, index) {
            let finalName = baseName;
            let finalPrice = basePrice;
            
            const optSelect = document.getElementById(`opt-${index}`);
            
            if (optSelect) {
                const selected = optSelect.value.split('|');
                const oPrice = parseFloat(selected[0]);
                const oName = selected[1];

                if (oName !== "Standart") {
                    finalName += ` (${oName})`;
                    finalPrice += oPrice;
                }
            }

            cart.push({ name: finalName, price: parseFloat(finalPrice) });
            updateCart();
        }

        // Sepeti Güncelle
        function updateCart() {
            const cartDiv = document.getElementById('cart');
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total');

            if (cart.length > 0) cartDiv.classList.remove('hidden');

            itemsDiv.innerHTML = cart.map(i => `
                <div class="flex justify-between text-gray-600">
                    <span>• ${i.name}</span>
                    <span class="font-medium">£${i.price.toFixed(2)}</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, i) => sum + i.price, 0);
            totalSpan.innerText = '£' + total.toFixed(2);
        }

        // Ödeme ve Sipariş Numarası Üretme
        document.getElementById('pay-btn').onclick = async function() {
            const address = document.getElementById('address').value;
            let note = document.getElementById('note').value;

            if (!address) return alert("Lütfen teslimat adresi girin!");

            // 4 Haneli Rastgele Sipariş Numarası Üret
            const orderNumber = '#' + Math.floor(1000 + Math.random() * 9000);
            
            // Notu sipariş numarasıyla birleştir
            const finalNote = `[SİPARİŞ NO: ${orderNumber}] Müşteri Notu: ${note || 'Not yok'}`;

            this.disabled = true;
            this.innerText = "Bağlanıyor...";

            try {
                const res = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart, address, note: finalNote }) // Yenilenmiş notu gönderiyoruz
                });

                const data = await res.json();
                
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    throw new Error(data.error || "Ödeme başlatılamadı");
                }
            } catch (err) {
                alert("Hata: " + err.message);
                this.disabled = false;
                this.innerText = "ÖDEMEYE GEÇ";
            }
        };
    </script>
</body>
</html>
