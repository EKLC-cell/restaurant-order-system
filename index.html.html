<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipariş Paneli | Sahin Kebab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 p-4 max-w-md mx-auto min-h-screen pb-20">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-black text-green-800 tracking-tight">SAHIN KEBAB</h1>
        <div id="table-display" class="inline-block mt-2 px-4 py-1 bg-yellow-400 text-black font-bold rounded-full text-xs uppercase hidden">
            MASA: <span id="table-no"></span>
        </div>
    </div>
    
    <div id="menu" class="space-y-4">
        <div class="text-center py-10 text-gray-400 animate-pulse">Menü yükleniyor...</div>
    </div>

    <div id="cart" class="mt-8 p-5 bg-white rounded-3xl shadow-2xl border border-gray-100 hidden">
        <h2 class="font-bold border-b pb-3 text-lg flex justify-between">
            <span>Sepetiniz</span>
            <button onclick="clearCart()" class="text-xs text-red-500 font-normal underline">Temizle</button>
        </h2>
        
        <div id="cart-items" class="py-4 space-y-3 text-sm"></div>
        
        <div class="border-t pt-4 space-y-3">
            <div id="address-area">
                <label class="text-xs font-bold text-gray-500 uppercase ml-1">Teslimat Adresi</label>
                <textarea id="address" placeholder="Sokak, No, Posta Kodu..." class="w-full border rounded-xl p-3 text-sm focus:ring-2 focus:ring-green-500 outline-none bg-gray-50"></textarea>
            </div>
            
            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Sipariş Notu</label>
            <input id="note" type="text" placeholder="Örn: Acılı olsun, peçete gelsin..." class="w-full border rounded-xl p-3 text-sm focus:ring-2 focus:ring-green-500 outline-none bg-gray-50">
        </div>

        <div class="text-2xl font-black mt-6 flex justify-between items-center text-gray-800">
            <span>Toplam:</span>
            <span id="total" class="text-green-700 font-mono">£0.00</span>
        </div>

        <button id="pay-btn" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl mt-6 font-bold text-lg shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
            <span>ÖDEMEYE GEÇ</span>
        </button>
    </div>

    <script>
        // --- AYARLAR ---
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMVMYCDOLiaf2sC5vVtiDHBAZtXAokyWvf4AvIp7lE67gdX0x_CW4HK8BlqujK9THn5wMerAywSqBy/pub?gid=0&single=true&output=csv'; 
        let cart = [];

        // --- MASA NUMARASI ÇEKME ---
        const urlParams = new URLSearchParams(window.location.search);
        const tableNumber = urlParams.get('table');

        if (tableNumber) {
            document.getElementById('table-display').classList.remove('hidden');
            document.getElementById('table-no').innerText = tableNumber;
            // Masa siparişi ise adres alanını gizle
            document.getElementById('address-area').classList.add('hidden');
            document.getElementById('address').value = `MASA SİPARİŞİ: ${tableNumber}`;
        }

        // --- MENÜYÜ YÜKLE ---
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (results) => {
                const menu = document.getElementById('menu');
                menu.innerHTML = '';
                
                results.data.forEach((item, index) => {
                    const cleanItem = {};
                    Object.keys(item).forEach(key => {
                        cleanItem[key.trim().toLowerCase()] = item[key];
                    });

                    const name = cleanItem.name;
                    const price = parseFloat(cleanItem.price);
                    const optionsStr = cleanItem.options;

                    if (name && !isNaN(price)) {
                        let optionsHTML = '';
                        if (optionsStr && optionsStr.trim() !== '') {
                            const opts = optionsStr.split(',');
                            optionsHTML = `<select id="opt-${index}" class="mt-3 w-full border rounded-lg p-2 text-xs text-gray-600 bg-gray-50 outline-none">
                                <option value="0|Standart">Standart (+£0.00)</option>`;
                            
                            opts.forEach(opt => {
                                const parts = opt.split(':');
                                if (parts.length === 2) {
                                    const oName = parts[0].trim();
                                    const oPrice = parseFloat(parts[1]);
                                    optionsHTML += `<option value="${oPrice}|${oName}">${oName} (+£${oPrice.toFixed(2)})</option>`;
                                }
                            });
                            optionsHTML += `</select>`;
                        }

                        menu.innerHTML += `
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col transition-all hover:shadow-md">
                                <div class="flex justify-between items-center">
                                    <div class="flex-1">
                                        <h3 class="font-bold text-gray-800 text-lg">${name}</h3>
                                        <p class="text-green-600 font-bold tracking-tighter">£${price.toFixed(2)}</p>
                                    </div>
                                    <button onclick="addToCart('${name.replace(/'/g, "\\'")}', ${price}, ${index})" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-green-700 transition-colors">
                                        + EKLE
                                    </button>
                                </div>
                                ${optionsHTML}
                            </div>
                        `;
                    }
                });
            }
        });

        // --- SEPET İŞLEMLERİ ---
        function addToCart(baseName, basePrice, index) {
            let finalName = baseName;
            let finalPrice = basePrice;
            
            const optSelect = document.getElementById(`opt-${index}`);
            if (optSelect) {
                const selected = optSelect.value.split('|');
                const oPrice = parseFloat(selected[0]);
                const oName = selected[1];
                if (oName !== "Standart") {
                    finalName += ` (${oName})`;
                    finalPrice += oPrice;
                }
            }

            cart.push({ name: finalName, price: parseFloat(finalPrice) });
            updateCart();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cart');
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total');

            if (cart.length > 0) cartDiv.classList.remove('hidden');
            else cartDiv.classList.add('hidden');

            itemsDiv.innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between text-gray-700 animate-fadeIn">
                    <span class="flex gap-2">
                        <button onclick="removeItem(${idx})" class="text-red-400">✕</button>
                        ${i.name}
                    </span>
                    <span class="font-bold italic text-gray-500 font-mono">£${i.price.toFixed(2)}</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, i) => sum + i.price, 0);
            totalSpan.innerText = '£' + total.toFixed(2);
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            updateCart();
        }

        function clearCart() {
            cart = [];
            updateCart();
        }

        // --- ÖDEME GÖNDERME ---
        document.getElementById('pay-btn').onclick = async function() {
            const address = document.getElementById('address').value;
            const note = document.getElementById('note').value;

            if (!address) return alert("Lütfen teslimat adresi veya masa bilgisini boş bırakmayın!");

            // Rastgele 4 Haneli Sipariş Numarası
            const orderID = '#' + Math.floor(1000 + Math.random() * 9000);
            
            // Stripe Notunu Zenginleştirme (Usta için her şey burada!)
            const tableInfo = tableNumber ? `MASA: ${tableNumber}` : "PAKET SİPARİŞ";
            const finalNote = `[NO: ${orderID}] [${tableInfo}] Müşteri Notu: ${note || 'Yok'}`;

            this.disabled = true;
            this.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> BAĞLANILIYOR...`;

            try {
                const res = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart, address, note: finalNote })
                });

                const data = await res.json();
                if (data.url) window.location.href = data.url;
                else throw new Error(data.error);
            } catch (err) {
                alert("Sistem Hatası: " + err.message);
                this.disabled = false;
                this.innerText = "ÖDEMEYE GEÇ";
            }
        };
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</body>
</html>
