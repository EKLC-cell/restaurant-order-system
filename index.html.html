<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cafe 81 | Order Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { padding-bottom: 120px; background-color: #f9fafb; }
        .floating-cart { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .floating-cart.active { transform: translateY(0); }
    </style>
</head>
<body class="font-sans text-gray-900">

    <header class="bg-white p-5 sticky top-0 z-40 border-b border-gray-100 flex justify-center shadow-sm">
        <h1 class="text-xl font-black tracking-tighter text-green-700">CAFE 81</h1>
    </header>

    <div id="menu" class="p-4 space-y-4 max-w-md mx-auto">
        <div class="flex justify-center py-10 italic text-gray-400">Loading menu...</div>
    </div>

    <div id="cart" class="fixed bottom-0 left-0 right-0 z-50 floating-cart">
        <div class="max-w-md mx-auto bg-white rounded-t-[2.5rem] shadow-[0_-20px_50px_rgba(0,0,0,0.1)] p-6 pb-8 border-t border-gray-100">
            <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-2xl font-black">Your Order 🛒</h2>
                <button onclick="toggleCart()" class="text-gray-400 font-bold text-xs uppercase">Close</button>
            </div>
            <div id="cart-items" class="max-h-40 overflow-y-auto mb-6 space-y-3 px-2"></div>
            <div class="space-y-3 mb-6">
                <input id="address" type="text" placeholder="Delivery Address" class="w-full bg-gray-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-green-500">
                <input id="note" type="text" placeholder="Note (Ex: No garlic)" class="w-full bg-gray-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-green-500">
            </div>
            <div class="flex items-center justify-between gap-4">
                <div class="pl-2">
                    <span class="text-[10px] text-gray-400 font-bold uppercase block">Total</span>
                    <span class="text-3xl font-black text-green-700" id="total">£0.00</span>
                </div>
                <button id="pay-btn" class="flex-1 bg-green-600 text-white py-5 rounded-2xl font-black shadow-xl active:scale-95 transition-all">CHECKOUT</button>
            </div>
        </div>
    </div>

    <div id="cart-trigger" class="fixed bottom-8 right-6 z-40 hidden">
        <button onclick="toggleCart()" class="bg-black text-white px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 font-bold">
            <span id="trigger-total">£0.00</span>
            <span class="text-green-400 text-xs">VIEW CART</span>
        </button>
    </div>

    <script>
        // --- KENDİ CSV LİNKİNİ BURAYA YAPIŞTIR ---
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMVMYCDOLiaf2sC5vVtiDHBAZtXAokyWvf4AvIp7lE67gdX0x_CW4HK8BlqujK9THn5wMerAywSqBy/pub?gid=0&single=true&output=csv';
        let cart = [];

        Papa.parse(CSV_URL, {
            download: true, header: true, complete: (res) => {
                const menu = document.getElementById('menu');
                menu.innerHTML = '';
                res.data.forEach((item, idx) => {
                    const price = parseFloat(item.price);
                    if(item.name && !isNaN(price)) {
                        let optsHTML = '';
                        if(item.options) {
                            optsHTML = `<select id="opt-${idx}" class="mt-3 w-full bg-gray-50 border border-gray-100 rounded-xl p-3 text-xs font-bold text-gray-500">
                                <option value="0|Standard">Standard (+£0.00)</option>`;
                            item.options.split(',').forEach(o => {
                                const [n, p] = o.split(':');
                                optsHTML += `<option value="${p.trim()}|${n.trim()}">${n.trim()} (+£${parseFloat(p).toFixed(2)})</option>`;
                            });
                            optsHTML += `</select>`;
                        }
                        menu.innerHTML += `
                            <div class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm flex justify-between items-center gap-4">
                                <div class="flex-1">
                                    <h3 class="font-black text-gray-800 leading-tight">${item.name}</h3>
                                    <p class="text-green-600 font-bold mt-1 text-sm">£${price.toFixed(2)}</p>
                                </div>
                                <button onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${price}, ${idx})" class="bg-green-600 text-white w-10 h-10 rounded-xl font-bold active:scale-90">+</button>
                                ${optsHTML}
                            </div>`;
                    }
                });
            }
        });

        function addToCart(n, p, i) {
            let fn = n, fp = p;
            const opt = document.getElementById(`opt-${i}`);
            if(opt) {
                const [price, name] = opt.value.split('|');
                if(name !== 'Standard') { fn += ` (${name})`; fp += parseFloat(price); }
            }
            cart.push({name: fn, price: fp});
            updateCart();
            if(cart.length === 1) toggleCart();
        }

        function updateCart() {
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total');
            const triggerTotal = document.getElementById('trigger-total');
            const triggerDiv = document.getElementById('cart-trigger');

            itemsDiv.innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl text-xs font-bold">
                    <span>${i.name}</span>
                    <div class="flex items-center gap-3">
                        <span>£${i.price.toFixed(2)}</span>
                        <button onclick="removeFromCart(${idx})" class="text-red-400 text-lg">×</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((s, i) => s + i.price, 0);
            totalSpan.innerText = triggerTotal.innerText = '£' + total.toFixed(2);
            if(cart.length > 0) triggerDiv.classList.remove('hidden');
            else { triggerDiv.classList.add('hidden'); toggleCart(false); }
        }

        function removeFromCart(idx) { cart.splice(idx, 1); updateCart(); }
        function toggleCart(force) {
            const c = document.getElementById('cart');
            if(force === false) c.classList.remove('active');
            else c.classList.toggle('active');
        }

        document.getElementById('pay-btn').onclick = async function() {
            const addr = document.getElementById('address').value;
            const note = document.getElementById('note').value;
            if(!addr) return alert("Please enter delivery address!");
            this.innerText = "WAIT...";
            this.disabled = true;
            try {
                const res = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cart, address: addr, note: `[ID: ${Math.floor(Math.random()*9000)}] ${note}`})
                });
                const d = await res.json();
                if(d.url) window.location.href = d.url;
            } catch(e) { alert("Error"); this.disabled = false; this.innerText = "CHECKOUT"; }
        };
    </script>
</body>
</html>
